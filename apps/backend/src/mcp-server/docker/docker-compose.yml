services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      ENV: dev
      POSTGRES_URL: postgresql+asyncpg://petcare-admin:supersecret@postgres:5432/petcare
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: petcare
      MINIO_SECRET_KEY: petcare123
      MINIO_BUCKET_PRIVATE: petcare-private
      MINIO_USE_SSL: "false"
      JWT_SECRET_KEY: petcare-mcp-local-jwt-secret-change-me
      AUTH_DEMO_PASSWORD: petcare-demo-password
      REQUEST_TIMEOUT_SECONDS: "5"
      DEFAULT_LLM: gemma
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: petcare
      POSTGRES_USER: petcare-admin
      POSTGRES_PASSWORD: supersecret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petcare-admin -d petcare"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: petcare
      MINIO_ROOT_PASSWORD: petcare123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:

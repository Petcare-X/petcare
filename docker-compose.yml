services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_PRIVATE: ${MINIO_BUCKET_PRIVATE}
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 1; done
        mc mb --ignore-existing "local/$${MINIO_BUCKET_PRIVATE}"
    restart: "no"

  backend:
    build:
      context: ./apps/backend
    restart: unless-stopped
    working_dir: /app
    command:
      - sh
      - -c
      - uv sync --frozen --no-install-project --no-dev && uv run alembic upgrade head && uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir src
    environment:
      DATABASE_URL: ${DATABASE_URL}
      INVITE_BASE_URL: ${INVITE_BASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_INTERNAL_TOKEN: ${TELEGRAM_BOT_INTERNAL_TOKEN:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_PRIVATE: ${MINIO_BUCKET_PRIVATE}
      MINIO_SECURE: ${MINIO_SECURE}
      MINIO_PUBLIC_SECURE: ${MINIO_PUBLIC_SECURE:-}
      MINIO_REGION: ${MINIO_REGION}
      MINIO_PRESIGNED_UPLOAD_TTL_SEC: ${MINIO_PRESIGNED_UPLOAD_TTL_SEC:-900}
      MINIO_PRESIGNED_DOWNLOAD_TTL_SEC: ${MINIO_PRESIGNED_DOWNLOAD_TTL_SEC:-3600}
      YANDEX_GEOCODER_API_KEY: ${YANDEX_GEOCODER_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1/chat/completions}
      ENV: ${ENV}
      WATCHFILES_FORCE_POLLING: ${WATCHFILES_FORCE_POLLING:-true}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app
      - backend_venv:/app/.venv

  bot:
    profiles: ["bot"]
    build:
      context: ./apps/backend
    restart: unless-stopped
    working_dir: /app
    command: ["uv", "run", "python", "-m", "src.bot.main"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      INVITE_BASE_URL: ${INVITE_BASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_INTERNAL_TOKEN: ${TELEGRAM_BOT_INTERNAL_TOKEN:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_PRIVATE: ${MINIO_BUCKET_PRIVATE}
      MINIO_SECURE: ${MINIO_SECURE}
      MINIO_PUBLIC_SECURE: ${MINIO_PUBLIC_SECURE:-}
      MINIO_REGION: ${MINIO_REGION}
      MINIO_PRESIGNED_UPLOAD_TTL_SEC: ${MINIO_PRESIGNED_UPLOAD_TTL_SEC:-900}
      MINIO_PRESIGNED_DOWNLOAD_TTL_SEC: ${MINIO_PRESIGNED_DOWNLOAD_TTL_SEC:-3600}
      YANDEX_GEOCODER_API_KEY: ${YANDEX_GEOCODER_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1/chat/completions}
      ENV: ${ENV}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./apps/backend:/app
      - backend_venv:/app/.venv

  frontend:
    build:
      context: ./apps/frontend
    restart: unless-stopped
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    depends_on:
      backend:
        condition: service_started
    environment:
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET}
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  backend_venv:
  postgres_data:
  minio_data:
  frontend_node_modules:

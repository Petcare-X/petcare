services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-petcare}
      POSTGRES_USER: ${POSTGRES_USER:-petcare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petcare}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-petcare} -d ${POSTGRES_DB:-petcare}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-petcare}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-petcare123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-petcare} ${MINIO_ROOT_PASSWORD:-petcare123}; do sleep 1; done
        mc mb --ignore-existing local/${MINIO_BUCKET_PRIVATE:-petcare-private}
    restart: "no"

  backend:
    build:
      context: ./apps/backend
    restart: unless-stopped
    working_dir: /app
    command:
      - sh
      - -c
      - uv run alembic upgrade head && uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir src
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-petcare}:${POSTGRES_PASSWORD:-petcare}@postgres:5432/${POSTGRES_DB:-petcare}
      INVITE_BASE_URL: ${INVITE_BASE_URL:-http://localhost:5173}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-change-me-change-me-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_INTERNAL_TOKEN: ${TELEGRAM_BOT_INTERNAL_TOKEN:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-petcare}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-petcare123}
      MINIO_BUCKET_PRIVATE: ${MINIO_BUCKET_PRIVATE:-petcare-private}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_PRESIGNED_UPLOAD_TTL_SEC: ${MINIO_PRESIGNED_UPLOAD_TTL_SEC:-900}
      MINIO_PRESIGNED_DOWNLOAD_TTL_SEC: ${MINIO_PRESIGNED_DOWNLOAD_TTL_SEC:-300}
      WATCHFILES_FORCE_POLLING: ${WATCHFILES_FORCE_POLLING:-true}
      YANDEX_GEOCODER_API_KEY: ${YANDEX_GEOCODER_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1/chat/completions}
      ENV: ${ENV:-dev}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app

  bot:
    profiles: ["bot"]
    build:
      context: ./apps/backend
    restart: unless-stopped
    working_dir: /app
    command: ["uv", "run", "python", "-m", "src.bot.main"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-petcare}:${POSTGRES_PASSWORD:-petcare}@postgres:5432/${POSTGRES_DB:-petcare}
      INVITE_BASE_URL: ${INVITE_BASE_URL:-http://localhost:5173}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-change-me-change-me-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_INTERNAL_TOKEN: ${TELEGRAM_BOT_INTERNAL_TOKEN:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-petcare}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-petcare123}
      MINIO_BUCKET_PRIVATE: ${MINIO_BUCKET_PRIVATE:-petcare-private}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_PRESIGNED_UPLOAD_TTL_SEC: ${MINIO_PRESIGNED_UPLOAD_TTL_SEC:-900}
      MINIO_PRESIGNED_DOWNLOAD_TTL_SEC: ${MINIO_PRESIGNED_DOWNLOAD_TTL_SEC:-300}
      YANDEX_GEOCODER_API_KEY: ${YANDEX_GEOCODER_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1/chat/completions}
      ENV: ${ENV:-dev}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./apps/backend:/app

  frontend:
    build:
      context: ./apps/frontend
    restart: unless-stopped
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    depends_on:
      backend:
        condition: service_started
    environment:
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  minio_data:
  frontend_node_modules:
